<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: math;
        }


        section {
            display: flex;
            justify-content: center;
            text-align: center;
            margin-top: 25px;
        }


        input {
            width: 300px;
            padding: 5px;
            border: 1px solid gray;
            border-radius: 7px;
        }


        button {
            padding: 5px;
            border: 1px solid gray;
            border-radius: 7px;
            cursor: pointer;
        }


        img{
            width: 80%;
            height: 80vh;
            margin-top: 20px;
            border-radius: 7px;
        }


        .middleBox{
            width: 100%;
        }
    </style>
</head>


<body>
    <section>
        <div class="middleBox">
            <div class="inputBox">
                <input type="url" placeholder="Enter Image url..." id="url">
                <button onclick="createImage()">Create Image</button>
            </div>
            <div class="resultBox" id="result">
                <!-- <img src="https://indian-retailer.s3.ap-south-1.amazonaws.com/s3fs-public/inline-images/2c.jpg" alt="" id="img"> -->
            </div>
        </div>
    </section>


    <script>
        function createImage(){
            let url = document.getElementById('url')
            // let img = document.getElementById('img')


            // img.src = url.value


            let result = document.getElementById('result')
            result.innerHTML = '<img src="'+ url.value +'" alt="">'
        }
    </script>
</body>


</html>
