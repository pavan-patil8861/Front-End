<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: math;
        }


        section {
            display: flex;
            justify-content: center;
            margin-top: 30px;
            text-align: center;
        }


        textarea {
            width: 400px;
            height: 150px;
            padding: 10px;
            border-radius: 7px;
            resize: none;
        }


        #btnColor {
            padding: 5px;
            margin-bottom: 5px;
        }


        .btnBox button {
            padding: 5px;
        }


        .text-formatBtn {
            margin-top: 5px;
        }


        .text-formatBtn button {
            padding: 5px;
        }

        body {
            background: white;
            color: black;
        }

        .dark-mode {
            background: #121212;
            color: white;
        }

        .dark-mode textarea {
            background: #1e1e1e;
            color: white;
            border: 1px solid white;
        }

        /* 
        .vi-sun-fill {
            display: inline-block;
        } */

        #switch-mode {
            font-size: 25px;
            margin-top: 270px;
            cursor: pointer;
        }
    </style>
</head>


<body>
    <section>
        <div class="mainBox">
            <div class="text">
                <textarea placeholder="Give me some text..." id="text"></textarea>
            </div>
            <div class="btnBox" id="btnBox">
                <input type="text" placeholder="Color name" id="btnColor">
                <button onclick="createBtn()">Create Button</button><br>
                <button onclick="setColorOntext(innerText)">Red</button>
                <button onclick="setColorOntext(innerText)">Green</button>
                <button onclick="setColorOntext('Yellow')">Yellow</button>
            </div>
            <div class="text-formatBtn">
                <button onclick="transformText(innerText)">Uppercase</button>
                <button onclick="transformText(innerText)">Lowercase</button>
                <button onclick="transformText(innerText)">Capitalize</button>
            </div>
            <div class="size">
                <label for="font-size">Font size : </label>
                <input oninput="changeFontSize(value)" type="range" id="font-size" value="0" max="100">
            </div>
        </div>



        <div id="switch-mode" onclick="changeMode()">
            <i class="bi bi-moon-fill"></i>
        </div>

    </section>


    <script>


        let text = document.getElementById('text')


        function setColorOntext(clrName) {
            text.style.color = clrName
        }


        function createBtn() {
            let btnColor = document.getElementById('btnColor').value
            let btnBox = document.getElementById('btnBox')
            btnBox.innerHTML += '<button onclick="setColorOntext(innerText)">' + btnColor + '</button>'
        }


        function transformText(transform) {
            text.style.textTransform = transform
        }


        let showPx = document.getElementById('showPx')
        showPx.innerText = '0px'

        function changeFontSize(txtSize) {
            // console.log(txtSize)
            text.style.fontSize = txtSize + 'px'
            showPx.innerText = txtSize + 'px'
        }

        function changeMode() {
            let body = document.body;
            let modeBtn = document.getElementById('switch-mode');

            if (body.className === "dark-mode") {
                // switch to light mode
                body.className = "";
                modeBtn.innerHTML = '<i class="bi bi-moon-fill"></i>';   // Moon
            }
            else {
                // switch to dark mode
                body.className = "dark-mode";
                modeBtn.innerHTML = '<i class="bi bi-brightness-high-fill"></i>';  // Sun
            }
        }



    </script>
</body>


</html>
