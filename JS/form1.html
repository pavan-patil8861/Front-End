<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Student Registration Form</h1>
    <section>
        <label for="text">Student Name</label>
        <div class="inputbox">
            <input type="text">
        </div>

        <label for="text">Mobile No.</label>
        <div class="inputbox">
            <input type="text">
        </div>

        <label for="text">Email Id</label>
        <div class="inputbox">
            <input type="text">
        </div>

        <label for="text">Father Name</label>
        <div class="inputbox">
            <input type="text">
        </div>

        <label for="text">Mother Name</label>
        <div class="inputbox">
            <input type="text">
        </div>

        <label for="text">Select Course</label>
        <div class="inputbox">
            <select id="select">
                <option>Select....</option>
                <>
                    <option>Web Development</option>
                    <option>Java Developer</option>
                    <option>Data Science</option>
            </select>
        </div>

        <label for="text">Date Of Birth</label>
        <div class="inputbox">
            <input type="date">
        </div>

        <label for="text">Gender</label>
        <div class="inputbox">
            <input type="radio" id="Male" name="Gender">
            <label for="text">Male</label>
            <input type="radio" id="Female" name="Gender">
            <label for="text">Female</label>
        </div>

        <label for="text">Student Photo</label>
        <div class="inputbox">
            <input type="file">
        </div>

        <label for="text">Select Branch</label>
        <div class="inputbox">
            <!-- <input type="checkbox"> -->
            <input id="branch">
            <input type="checkbox">
            <label for="text">CSE</label>

            <input type="checkbox">
            <label for="text">IT</label>

            <input type="checkbox">
            <label for="text">CIVIL</label>

            <input type="checkbox">
            <label for="text">MECH</label>

        </div>

        <label for="text">Address</label>
        <div class="inputbox">
            <input type="textarea">
        </div>
        <br>
        <div>
            <input type="submit">
        </div>





    </section>
</body>

</html>
