<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button onclick="createTag()">Create Tags</button>
    <div id="box"></div>

    <script>
        let num = 1
        function createTag() {
            let box = document.getElementById('box')
            box.innerHTML += '<h1> Hii im Heading' + (num++) + '</h1>'
        }
    </script>
</body>

</html>
